<!DOCTYPE html>
<html>
<head>
    <title> Web Dashboard</title>
    <!-- 1. Carichiamo la libreria per parlare con Mosquitto -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/paho-mqtt.min.js" type="text/javascript"></script>  
    <!-- 2. Carichiamo le icone di Google -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #e9ecef; }
        .container { margin-top: 100px; background: white; display: inline-block; padding: 50px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #icona-movimento { font-size: 120px; color: #555; transition: 0.3s; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        .connesso { background: #d4edda; color: #155724; }
        .disconnesso { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Indicatore connessione al Broker -->
        <div id="label-connessione" class="status-badge disconnesso">Broker: Disconnesso</div>
        
        <h1>Rilevamento Braccio</h1>
        
        <!-- Qui cambierà il simbolo -->
        <span id="icona-movimento" class="material-icons">sensors</span>
        
        <!-- Qui cambierà il testo -->
        <h2 id="testo-movimento">In attesa dello smartwatch...</h2>
    </div>

    <!-- Colleghiamo il file JavaScript che scriveremo tra poco -->
    <script src="app.js"></script>
</body>
</html>
